name: AgriCam DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# =========================
# JOB 1 - VALIDATION
# =========================
jobs:

  validate:
    name: Terraform Validate & Format
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: environnements/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check (non blocking)
        run: terraform fmt -check -recursive || true

      - name: Terraform Validate
        run: terraform validate


  # =========================
  # JOB 2 - LINTING
  # =========================
  lint:
    name: TFLint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: environnements/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          tflint --init
          tflint


  # =========================
  # JOB 3 - SECURITY SCAN (CHECKOV SKIPPÉ)
  # =========================
  security:
    name: Security Scan (Trivy only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ❌ CHECKOV SKIPPÉ (comme demandé)

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .


  # =========================
  # JOB 4 - PLAN
  # =========================
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    needs: [validate, lint]

    defaults:
      run:
        working-directory: environnements/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: environnements/dev/tfplan


  # =========================
  # JOB 5 - APPLY (PROTECTED)
  # =========================
  apply:
    name: Terraform Apply (PRODUCTION)
    runs-on: ubuntu-latest

    needs: plan

    if: github.ref == 'refs/heads/main'

    environment:
      name: production   # 🔥 APPROVAL GITHUB REQUIRED

    defaults:
      run:
        working-directory: environnements/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: environnements/dev

      - name: Terraform Apply
        run: terraform apply tfplan