name: AgriCam DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # =========================
  # CI - VALIDATION
  # =========================
  terraform-security:
    name: Terraform Validation
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-3

      TF_VAR_environnement: dev
      TF_VAR_ip_admin: ${{ secrets.IP_ADMIN }}
      TF_VAR_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_type_instance: t3.small

    defaults:
      run:
        working-directory: environnements/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      # FORMAT (non bloquant)
      - name: Terraform Format Check
        run: terraform fmt -check -recursive || true

      - name: Terraform Validate
        run: terraform validate

      # TFLINT
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          tflint --init
          tflint

      # CHECKOV (DISABLED FOR NOW - SAFE DEBUG MODE)
      # - name: Run Checkov
      #   uses: bridgecrewio/checkov-action@master
      #   continue-on-error: true
      #   with:
      #     directory: environnements/dev
      #     framework: terraform

      # TRIVY (OPTIONAL SECURITY SCAN)
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

      # PLAN
      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: environnements/dev/tfplan


  # =========================
  # CD - APPLY (PRODUCTION APPROVAL)
  # =========================
  terraform-apply:
    name: Terraform Apply (PRODUCTION)
    runs-on: ubuntu-latest

    needs: terraform-security

    if: github.ref == 'refs/heads/main'

    environment:
      name: production   # 🔥 GitHub approval obligatoire

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-3

      TF_VAR_environnement: dev
      TF_VAR_ip_admin: ${{ secrets.IP_ADMIN }}
      TF_VAR_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_type_instance: t3.small

    defaults:
      run:
        working-directory: environnements/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      # DOWNLOAD PLAN
      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: environnements/dev

      # APPLY (SECURE - NO AUTO APPROVE)
      - name: Terraform Apply
        run: terraform apply tfplan