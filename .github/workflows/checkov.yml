name: AgriCam Pipeline

on:
  push:
    branches: [main]

jobs:

  terraform:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-3

      # Terraform variables obligatoires
      TF_VAR_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_environnement: dev
      TF_VAR_ip_admin: ${{ secrets.IP_ADMIN }}

      # 🔥 FIX FREE TIER EC2
      TF_VAR_type_instance: t2.micro

    defaults:
      run:
        working-directory: environnements/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      # 🔍 DEBUG IMPORTANT
      - name: Debug instance type
        run: echo "INSTANCE_TYPE=$TF_VAR_type_instance"

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve