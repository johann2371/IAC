name: AgriCam DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # =========================
  # CI - SECURITY + VALIDATION
  # =========================
  terraform-security:
    name: Terraform Security & Validation
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-3

      TF_VAR_environnement: dev
      TF_VAR_ip_admin: ${{ secrets.IP_ADMIN }}
      TF_VAR_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_type_instance: t3.small

    defaults:
      run:
        working-directory: environnements/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      # =========================
      # FORMAT (NON BLOQUANT + SAFE)
      # =========================
      - name: Terraform Format Check
        run: terraform fmt -check -recursive || true

      - name: Terraform Validate
        run: terraform validate

      # =========================
      # TFLINT
      # =========================
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          tflint --init
          tflint

      # =========================
      # CHECKOV SECURITY SCAN
      # =========================
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: environnements/dev
          framework: terraform

      # =========================
      # TRIVY FS SCAN
      # =========================
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

      # =========================
      # PLAN (SAFE MODE)
      # =========================
      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: environnements/dev/tfplan


  # =========================
  # CD - APPLY (PROTECTED + APPROVAL)
  # =========================
  terraform-apply:
    name: Terraform Apply (PRODUCTION SAFE)
    runs-on: ubuntu-latest

    needs: terraform-security

    if: github.ref == 'refs/heads/main'

    environment:
      name: production   # 🔥 ACTIVE APPROVAL GITHUB SETTINGS

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-3

      TF_VAR_environnement: dev
      TF_VAR_ip_admin: ${{ secrets.IP_ADMIN }}
      TF_VAR_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_type_instance: t3.small

    defaults:
      run:
        working-directory: environnements/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      # =========================
      # DOWNLOAD PLAN (OPTION SAFE UPGRADE)
      # =========================
      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: environnements/dev

      # =========================
      # APPLY (NO AUTO APPROVE)
      # =========================
      - name: Terraform Apply
        run: terraform apply tfplan